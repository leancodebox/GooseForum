# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2
project_name: GooseForum

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: unix
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/leancodebox/GooseForum/app/bundles/buildinfo.Version={{ .Version }}
      - -X github.com/leancodebox/GooseForum/app/bundles/buildinfo.Commit={{ .Commit }}
      - -X github.com/leancodebox/GooseForum/app/bundles/buildinfo.BuildDate={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
  - id: windows
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/leancodebox/GooseForum/app/bundles/buildinfo.Version={{ .Version }}
      - -X github.com/leancodebox/GooseForum/app/bundles/buildinfo.Commit={{ .Commit }}
      - -X github.com/leancodebox/GooseForum/app/bundles/buildinfo.BuildDate={{ .Date }}
    goos:
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: unix
    ids: [unix]
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
  - id: windows
    ids: [windows]
    formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - LICENSE*
      - README*
      - src: scripts/windows/start.bat
        dst: start.bat

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

env_files:
  github_token: ~/.local/github_token

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
